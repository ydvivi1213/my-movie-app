<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Movie Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header h1 span {
      color: #e05c5c;
    }

    header p {
      color: #888;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .participant-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .participant-row:last-child { margin-bottom: 0; }

    .participant-row input[type="text"] {
      background: #0f0f13;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .participant-row input[type="text"]:focus {
      border-color: #e05c5c;
    }

    .name-input { width: 130px; flex-shrink: 0; }
    .prefs-input { flex: 1; }

    .btn-remove {
      background: none;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.45rem 0.65rem;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .btn-remove:hover { color: #e05c5c; border-color: #e05c5c; }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: #2a2a35;
      color: #ccc;
    }

    .btn-secondary:hover:not(:disabled) { background: #32323f; }

    .btn-primary {
      background: #e05c5c;
      color: #fff;
      margin-left: auto;
    }

    .btn-primary:hover:not(:disabled) { background: #cc4a4a; }

    /* Loading */
    #loading {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a35;
      border-top-color: #e05c5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    #error {
      display: none;
      background: #2a1515;
      border: 1px solid #5c2020;
      border-radius: 10px;
      color: #e05c5c;
      font-size: 0.9rem;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
    }

    /* Results */
    #results { display: none; margin-top: 2rem; }

    #results h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
    }

    .movie-card {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      transition: border-color 0.15s;
    }

    .movie-card:hover { border-color: #3a3a48; }

    .score-badge {
      background: #e05c5c;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .score-badge.high { background: #4caf7d; }
    .score-badge.mid  { background: #e0a050; }
    .score-badge.low  { background: #888; }

    .movie-info { flex: 1; }

    .movie-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
    }

    .movie-year {
      color: #666;
      font-size: 0.85rem;
      margin-left: 0.4rem;
    }

    .movie-reason {
      color: #aaa;
      font-size: 0.875rem;
      margin-top: 0.35rem;
      line-height: 1.5;
    }

    .genre-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .genre-tag {
      background: #22222c;
      border: 1px solid #2e2e3c;
      border-radius: 20px;
      color: #888;
      font-size: 0.75rem;
      padding: 0.2rem 0.65rem;
    }

    .label-row {
      display: flex;
      gap: 0.75rem;
      padding: 0 0 0.4rem;
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .label-name { width: 130px; flex-shrink: 0; }
    .label-prefs { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Group <span>Movie</span> Picker</h1>
      <p>Add everyone's vibe — get 7 recommendations that work for the whole group.</p>
    </header>

    <div class="card">
      <div class="label-row">
        <span class="label-name">Name</span>
        <span class="label-prefs">What do you want to watch? (genres, moods, titles, themes...)</span>
      </div>
      <div id="participants"></div>
      <div class="actions">
        <button class="btn btn-secondary" onclick="addParticipant()">+ Add person</button>
        <button class="btn btn-primary" id="submitBtn" onclick="getRecommendations()">Find movies</button>
      </div>
    </div>

    <div id="error"></div>
    <div id="loading">
      <div class="spinner"></div>
      <p>Analyzing everyone's preferences…</p>
    </div>
    <div id="results">
      <h2>Recommendations for your group</h2>
      <div id="movieList"></div>
    </div>
  </div>

  <script>
    let participantCount = 0;

    function addParticipant(defaultName = "", defaultPrefs = "") {
      participantCount++;
      const id = participantCount;
      const container = document.getElementById("participants");
      const row = document.createElement("div");
      row.className = "participant-row";
      row.id = `participant-${id}`;
      row.innerHTML = `
        <input type="text" class="name-input" placeholder="Name" value="${defaultName}" />
        <input type="text" class="prefs-input" placeholder="e.g. something funny but tense, love sci-fi, no gore" value="${defaultPrefs}" />
        <button class="btn-remove" onclick="removeParticipant(${id})" title="Remove">✕</button>
      `;
      container.appendChild(row);
    }

    function removeParticipant(id) {
      const el = document.getElementById(`participant-${id}`);
      if (el) el.remove();
    }

    function getParticipants() {
      const rows = document.querySelectorAll(".participant-row");
      const result = [];
      rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const name = inputs[0].value.trim() || "Person";
        const preferences = inputs[1].value.trim();
        if (preferences) result.push({ name, preferences });
      });
      return result;
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
    }

    function clearError() {
      document.getElementById("error").style.display = "none";
    }

    async function getRecommendations() {
      clearError();
      const participants = getParticipants();
      if (participants.length === 0) {
        showError("Add at least one person's preferences before submitting.");
        return;
      }

      const btn = document.getElementById("submitBtn");
      const loading = document.getElementById("loading");
      const results = document.getElementById("results");

      btn.disabled = true;
      loading.style.display = "block";
      results.style.display = "none";

      try {
        const res = await fetch("/api/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ participants }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Unknown error");

        renderResults(data.recommendations);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        loading.style.display = "none";
      }
    }

    function scoreClass(n) {
      if (n >= 8) return "high";
      if (n >= 5) return "mid";
      return "low";
    }

    function renderResults(movies) {
      const list = document.getElementById("movieList");
      list.innerHTML = "";
      movies.forEach(m => {
        const card = document.createElement("div");
        card.className = "movie-card";
        card.innerHTML = `
          <div class="score-badge ${scoreClass(m.matchScore)}">${m.matchScore}</div>
          <div class="movie-info">
            <div>
              <span class="movie-title">${m.title}</span>
              <span class="movie-year">${m.year}</span>
            </div>
            <div class="movie-reason">${m.reason}</div>
            <div class="genre-tags">
              ${m.genres.map(g => `<span class="genre-tag">${g}</span>`).join("")}
            </div>
          </div>
        `;
        list.appendChild(card);
      });
      document.getElementById("results").style.display = "block";
      document.getElementById("results").scrollIntoView({ behavior: "smooth" });
    }

    // Seed with two participants to start
    addParticipant("Alex", "");
    addParticipant("Jordan", "");
  </script>
</body>
</html>
